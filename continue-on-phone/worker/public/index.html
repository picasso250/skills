<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Continue on Phone</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body class="bg-background text-text">
  <main class="mx-auto max-w-chat px-4 pb-28 pt-[18px]">
    <div id="session-meta" class="mb-3 break-all text-center text-[11px] uppercase tracking-[0.08em] text-muted/70">loading...</div>
    <section id="messages" class="flex flex-col gap-[14px]"></section>
  </main>

  <div class="fixed inset-x-0 bottom-0 bg-gradient-to-t from-background via-background/95 to-transparent px-[14px] pb-[14px] pt-[10px]">
    <div class="mx-auto flex w-full max-w-chat items-end gap-[10px] rounded-full bg-surface-strong px-4 py-2 shadow-editorial transition-colors duration-200 focus-within:bg-surface">
      <textarea id="text" rows="1" placeholder="输入你的消息..." class="min-h-6 max-h-40 w-full flex-1 resize-none border-0 bg-transparent px-0 py-[10px] text-base leading-6 text-text outline-none placeholder:text-muted/60"></textarea>
      <button id="send" aria-label="Send" class="h-[42px] w-[42px] shrink-0 rounded-full bg-primary text-base font-bold text-white transition-opacity disabled:opacity-55">↑</button>
    </div>
    <div id="status" class="mx-auto mt-2 max-w-chat text-center text-xs text-muted/80">ready</div>
  </div>

  <script>
    const pathMatch = window.location.pathname.match(/^\/s\/([a-zA-Z0-9_-]+)$/);
    const sessionId = pathMatch ? pathMatch[1] : "";
    const messagesEl = document.getElementById("messages");
    const sessionMetaEl = document.getElementById("session-meta");
    const statusEl = document.getElementById("status");
    const textEl = document.getElementById("text");
    const sendEl = document.getElementById("send");
    let lastSignature = "";
    let pollDelayMs = 1000;
    let pollTimer = null;
    let refreshInFlight = false;
    const MIN_POLL_DELAY_MS = 1000;
    const MAX_POLL_DELAY_MS = 10000;

    sessionMetaEl.textContent = sessionId ? `session ${sessionId}` : "missing session_id";

    function escapeHtml(input) {
      return input
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function formatTs(value) {
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    function autoresize() {
      textEl.style.height = "auto";
      textEl.style.height = `${Math.min(textEl.scrollHeight, 160)}px`;
    }

    function renderMessage(message) {
      const isUser = message.role === "user";
      const rowClass = isUser
        ? "flex w-full justify-end pl-11"
        : "flex w-full justify-start pr-7";
      const bubbleClass = isUser
        ? "max-w-full rounded-2xl rounded-br-sm bg-primary px-4 py-[14px] text-[15px] leading-[1.6] text-primary-text shadow-editorial"
        : "max-w-full rounded-2xl rounded-bl-sm border border-muted/10 bg-surface px-4 py-[14px] text-[15px] leading-[1.6] text-text shadow-editorial";
      return `
        <div class="${rowClass}">
          <div>
            <div class="${bubbleClass}">${escapeHtml(message.text)}</div>
            <div class="mt-1.5 text-[11px] text-muted/80">${message.role} · ${formatTs(message.ts)}</div>
          </div>
        </div>
      `;
    }

    function renderMessages(messages) {
      const nextSignature = JSON.stringify(messages);
      if (nextSignature === lastSignature) {
        return false;
      }
      lastSignature = nextSignature;
      messagesEl.innerHTML = messages.map(renderMessage).join("");
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      return true;
    }

    function scheduleRefresh(delayMs = pollDelayMs) {
      if (pollTimer) {
        clearTimeout(pollTimer);
      }
      pollTimer = setTimeout(() => { void refresh(); }, delayMs);
    }

    function noteRefreshResult(changed) {
      if (changed) {
        pollDelayMs = MIN_POLL_DELAY_MS;
      } else {
        pollDelayMs = Math.min(pollDelayMs * 2, MAX_POLL_DELAY_MS);
      }
    }

    async function refresh() {
      if (refreshInFlight) {
        return;
      }
      refreshInFlight = true;
      if (!sessionId) {
        statusEl.textContent = "missing session_id";
        refreshInFlight = false;
        return;
      }
      try {
        const response = await fetch(`/api/sessions/${sessionId}`, { cache: "no-store" });
        if (!response.ok) {
          statusEl.textContent = response.status === 401 || response.status === 403
            ? "auth required"
            : "failed to load session";
          pollDelayMs = MIN_POLL_DELAY_MS;
          return;
        }
        const data = await response.json();
        statusEl.textContent = `updated ${formatTs(data.updated_at)}`;
        const changed = renderMessages(data.messages || []);
        noteRefreshResult(changed);
      } finally {
        refreshInFlight = false;
        scheduleRefresh();
      }
    }

    async function sendMessage() {
      const text = textEl.value.trim();
      if (!sessionId) {
        statusEl.textContent = "missing session";
        return;
      }
      if (!text) {
        statusEl.textContent = "empty";
        return;
      }

      sendEl.disabled = true;
      statusEl.textContent = "sending...";
      const response = await fetch(`/api/sessions/${sessionId}/messages`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ role: "user", text }),
      });

      if (!response.ok) {
        statusEl.textContent = response.status === 401 || response.status === 403
          ? "auth required"
          : "send failed";
        sendEl.disabled = false;
        return;
      }

      textEl.value = "";
      autoresize();
      sendEl.disabled = false;
      pollDelayMs = MIN_POLL_DELAY_MS;
      await refresh();
      statusEl.textContent = "sent";
    }

    sendEl.addEventListener("click", () => { void sendMessage(); });
    textEl.addEventListener("input", autoresize);
    textEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        void sendMessage();
      }
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        pollDelayMs = MIN_POLL_DELAY_MS;
        void refresh();
      }
    });

    autoresize();
    void refresh();
  </script>
</body>
</html>
